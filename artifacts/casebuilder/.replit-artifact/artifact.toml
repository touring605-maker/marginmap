kind = "web"
previewPath = "/"
title = "CaseBuilder"
version = "1.0.0"
id = "artifacts/casebuilder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25004
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/casebuilder run dev"

[services.env]
PORT = "25004"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/casebuilder", "run", "build"]
publicDir = "artifacts/casebuilder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
